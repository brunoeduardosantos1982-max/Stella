repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0
        exclude: ^tests/

  - repo: local
    hooks:
      - id: pytest
        name: pytest (testes rápidos)
        entry: D:/VortexBrain00/stella/.venv/Scripts/python.exe -m pytest -x --no-header -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
